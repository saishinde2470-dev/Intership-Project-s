<!doctype html>
<html lang="en">

<head>

<meta charset="utf-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>weatherApplication</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
rel="stylesheet">

<style>

body{
background:
linear-gradient(
135deg,
#0f172a,
#405b81
);

min-height:100vh;

overflow:hidden;

position:relative;

font-family:
'Poppins',
sans-serif;
}

body::before{

content:"";

position:absolute;

top:0;

left:-100%;

width:300%;

height:100%;

background:
url("https://www.transparenttextures.com/patterns/clouds.png");

opacity:.2;

animation:
moveClouds
45s
linear
infinite;

}

@keyframes moveClouds{

0%{
transform:
translateX(0);
}

100%{
transform:
translateX(-50%);
}

}

h1{

color:white;

padding-top:50px;

}

.weather-box{

background:
rgba(
255,
255,
255,
0.15
);

padding:30px;

border-radius:25px;

backdrop-filter:
blur(15px);

}

.container{

position:relative;

z-index:2;

}

#result{

color:white;

text-align:center;

margin-top:25px;

}

.form-control{

border-radius:15px;

}

.btn{

border-radius:15px;

}

</style>

</head>

<body>

<h1 class="display-3 text-center">
☁ Weather Application
</h1>

<div class="container w-50 mt-5">

<div class="weather-box">

<div class="row">

<div class="col">

<div class="form-floating">

<input
type="text"
class="form-control"
id="cityInput"
placeholder="Enter City">

<label for="cityInput">
Enter City
</label>

</div>

<button
class="btn btn-primary w-100 mt-2"
id="btnSubmit"
onclick="getData()">

Show Weather

</button>

</div>

</div>

<div class="container w-75">

<div id="result"></div>

</div>

</div>

</div>

<script src="./script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
</script>

</body>

</html>
