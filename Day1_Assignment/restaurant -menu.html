<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Menu Card</title>

    <style>
        body{
            background-color: lightyellow;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        h1{
            color: darkred;
        }

        table{
            margin: auto;
            background-color: white;
        }

        th{
            background-color: orange;
        }

        th, td{
            border: 1px solid black;
            padding: 10px;
        }
    </style>
</head>

<body>

    <h1>dine-in Restaurant</h1>

    <table>
        <tr>
            <th>Item</th>
            <th>Price</th>
        </tr>

        <tr>
            <td>Veg Burger</td>
            <td>₹80</td>
        </tr>

        <tr>
            <td>Pizza</td>
            <td>₹150</td>
        </tr>

        <tr>
            <td>Sandwich</td>
            <td>₹70</td>
        </tr>

        <tr>
            <td>Cold Drink</td>
            <td>₹40</td>
        </tr>

        <tr>
            <td>Ice Cream</td>
            <td>₹60</td>
        </tr>
    </table>

</body>
</html>
