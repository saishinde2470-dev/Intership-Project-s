<!DOCTYPE html>
<html>
<head>
    <title>Flower Webpage</title>

    <style>
        body{
            background-color: rgb(226, 181, 181);
            text-align: center;
            font-family: Arial, sans-serif;
        }

        p{
            font-size: 25px;
            color: rgb(146, 131, 131);
            width: 70%;
            margin: auto;
        }

        img{
            width: 300px;
            border-radius: 15px;
            margin: 10px;
        }

        table{
            margin: 20px auto;
            border-collapse: collapse;
            width: 50%;
        }

        th, td{
            border: 2px solid black;
            padding: 10px;
        }

        th{
            background-color: lightpink;
        }
    </style>
</head>

<body>

    <img src="rose.jpg" alt="Rose Flower">
    <img src="rose1.jpg" alt="Rose Flower">

    <p>
        <b>Rose Flower</b><br><br>
        Rose is one of the most beautiful flowers in the world.
        It is known for its fragrance, beauty, and attractive colors.
        Roses are commonly used for decoration, gifting, and expressing love.
    </p>

    <table>
        <tr>
            <th>Rose Name</th>
            <th>Price</th>
        </tr>
        <tr>
            <td>Red Rose</td>
            <td>₹50</td>
        </tr>
        <tr>
            <td>Pink Rose</td>
            <td>₹40</td>
        </tr>
    </table>

</body>
</html>
